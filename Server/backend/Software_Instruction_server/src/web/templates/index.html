<!DOCTYPE html>
<html>
<head>
    <title>Smart Software Support AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
        }

        .response {
            margin-top: 20px;
            white-space: pre-line;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
        }

        img {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Software Support AI</h2>

    <form method="POST">
        <input type="text" name="query" placeholder="Ask your software question..." required>
        <button type="submit">Ask</button>
    </form>

    {% if response %}
    <div class="response">
        {{ response }}
    </div>

    {% for img in images %}
        <img src="{{ img }}" />
    {% endfor %}

    {% endif %}
</div>

</body>
</html>
